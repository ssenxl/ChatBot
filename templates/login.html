<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - I-SAVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Noto Sans Thai", sans-serif;
            background-color: #070b14;
            background-image:
                linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed; top: -20%; left: -10%;
            width: 70%; height: 70%;
            background: radial-gradient(ellipse, rgba(0,212,255,0.05) 0%, transparent 65%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed; bottom: -20%; right: -10%;
            width: 60%; height: 60%;
            background: radial-gradient(ellipse, rgba(99,102,241,0.06) 0%, transparent 65%);
            pointer-events: none;
        }
        .tech-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #00d4ff;
            opacity: 0.8;
        }
        .glass-card {
            background: rgba(11,17,30,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,212,255,0.18);
            box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,212,255,0.05);
        }
        .input-tech {
            background: rgba(7,11,20,0.85);
            border: 1.5px solid rgba(0,212,255,0.15);
            color: #e2e8f0;
            transition: all 0.2s;
            font-family: "Noto Sans Thai", sans-serif;
        }
        .input-tech:focus {
            border-color: rgba(0,212,255,0.55);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.08), 0 0 20px rgba(0,212,255,0.08);
            outline: none;
        }
        .input-tech::placeholder { color: #374151; }
        .btn-primary {
            background: linear-gradient(135deg, #0090bb 0%, #00d4ff 100%);
            transition: all 0.25s ease;
            font-family: "Noto Sans Thai", sans-serif;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,212,255,0.45); }
        .btn-primary:active { transform: translateY(0); }
        .logo-ring {
            width: 96px; height: 96px;
            border-radius: 50%;
            border: 2px solid rgba(0,212,255,0.35);
            box-shadow: 0 0 0 6px rgba(0,212,255,0.06), 0 0 30px rgba(0,212,255,0.2);
            overflow: hidden;
            background: rgba(11,17,30,0.9);
        }
        .corner-dot {
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #00d4ff;
            box-shadow: 0 0 8px rgba(0,212,255,0.8);
        }
        @keyframes corner-pulse {
            0%, 100% { opacity: 0.5; } 50% { opacity: 1; }
        }
        .corner-dot { animation: corner-pulse 2s ease-in-out infinite; }
        .corner-line-h { position: absolute; height: 1px; width: 20px; background: rgba(0,212,255,0.5); }
        .corner-line-v { position: absolute; width: 1px; height: 20px; background: rgba(0,212,255,0.5); }
        .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: rgba(0,212,255,0.45); pointer-events: none; }
        .neon-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.2), transparent); margin: 1.5rem 0; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="relative w-full max-w-sm">

        <!-- Corner decorations -->
        <div class="absolute -top-3 -left-3 pointer-events-none">
            <div class="corner-dot"></div>
            <div class="corner-line-h" style="top:2.5px; left:8px;"></div>
            <div class="corner-line-v" style="top:8px; left:2.5px;"></div>
        </div>
        <div class="absolute -top-3 -right-3 pointer-events-none">
            <div class="corner-dot" style="right:0; animation-delay:0.5s;"></div>
            <div class="corner-line-h" style="top:2.5px; right:8px;"></div>
            <div class="corner-line-v" style="top:8px; right:2.5px;"></div>
        </div>
        <div class="absolute -bottom-3 -left-3 pointer-events-none">
            <div class="corner-dot" style="bottom:0; animation-delay:1s;"></div>
            <div class="corner-line-h" style="bottom:2.5px; left:8px;"></div>
            <div class="corner-line-v" style="bottom:8px; left:2.5px;"></div>
        </div>
        <div class="absolute -bottom-3 -right-3 pointer-events-none">
            <div class="corner-dot" style="bottom:0; right:0; animation-delay:1.5s;"></div>
            <div class="corner-line-h" style="bottom:2.5px; right:8px;"></div>
            <div class="corner-line-v" style="bottom:8px; right:2.5px;"></div>
        </div>

        <!-- Logo header -->
        <div class="text-center mb-6">
            <div class="logo-ring mx-auto mb-4">
                <img src="/static/logonew.png" alt="I-SAVE Logo" class="w-full h-full object-cover">
            </div>
            <p class="tech-label mb-1">INTELLIGENT SYSTEM</p>
            <h1 class="text-2xl font-bold" style="color:#e2e8f0; letter-spacing:-0.01em;">I-SAVE</h1>
        </div>

        <!-- Card -->
        <div class="glass-card rounded-2xl p-6">

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-4 p-3 rounded-xl text-sm flex items-center gap-2
                            {% if category == 'error' %}
                                text-rose-300
                            {% elif category == 'success' %}
                                text-emerald-300
                            {% else %}
                                text-cyan-300
                            {% endif %}"
                            style="
                            {% if category == 'error' %}
                                background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2);
                            {% elif category == 'success' %}
                                background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.2);
                            {% else %}
                                background:rgba(0,212,255,0.08); border:1px solid rgba(0,212,255,0.2);
                            {% endif %}">
                            <i class="fas {% if category == 'error' %}fa-circle-xmark{% elif category == 'success' %}fa-circle-check{% else %}fa-circle-info{% endif %} flex-shrink-0"></i>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label class="block text-xs font-semibold mb-2" style="color:#94a3b8;">ชื่อผู้ใช้</label>
                    <div class="relative">
                        <span class="input-icon"><i class="fas fa-user text-sm"></i></span>
                        <input type="text" name="username" required autocomplete="username"
                            class="input-tech w-full rounded-xl px-4 py-3 pl-10 text-sm"
                            placeholder="กรอกชื่อผู้ใช้">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold mb-2" style="color:#94a3b8;">รหัสผ่าน</label>
                    <div class="relative">
                        <span class="input-icon"><i class="fas fa-lock text-sm"></i></span>
                        <input type="password" name="password" required autocomplete="current-password"
                            class="input-tech w-full rounded-xl px-4 py-3 pl-10 text-sm"
                            placeholder="กรอกรหัสผ่าน">
                    </div>
                </div>

                <div class="flex justify-end">
                    <a href="/forgot-password" class="text-xs font-medium transition-colors" style="color:rgba(0,212,255,0.6);" onmouseover="this.style.color='#00d4ff'" onmouseout="this.style.color='rgba(0,212,255,0.6)'">ลืมรหัสผ่าน?</a>
                </div>

                <button type="submit" class="btn-primary w-full rounded-xl py-3 text-sm font-bold text-white">
                    <i class="fas fa-arrow-right-to-bracket mr-2"></i>เข้าสู่ระบบ
                </button>
            </form>

            <div class="neon-divider"></div>

            <p class="text-center text-sm" style="color:#4b5563;">
                ยังไม่มีบัญชี?
                <a href="{{ url_for('register') }}" class="font-semibold transition-colors" style="color:#00d4ff;" onmouseover="this.style.opacity='0.75'" onmouseout="this.style.opacity='1'">สมัครสมาชิก</a>
            </p>
        </div>

        <!-- Footer -->
        <p class="text-center mt-6 text-xs" style="color:#1f2937;">&copy; 2025 I-SAVE. All rights reserved.</p>
    </div>
</body>
</html>
