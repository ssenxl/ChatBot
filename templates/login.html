<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - I-SAVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 50%, #f0f4f8 100%);
        }
        .glass-effect {
            background: #ffffff;
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }
        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .shape {
            position: absolute;
            opacity: 0.08;
            animation: float 6s ease-in-out infinite;
        }
        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            background: #0096ff;
            border-radius: 50%;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }
        .shape:nth-child(2) {
            width: 120px;
            height: 120px;
            background: #0096ff;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            top: 70%;
            right: 10%;
            animation-delay: 2s;
        }
        .shape:nth-child(3) {
            width: 100px;
            height: 100px;
            background: #0096ff;
            border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            bottom: 10%;
            left: 30%;
            animation-delay: 4s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        .input-group {
            position: relative;
        }
        .input-group input {
            padding-left: 3rem;
        }
        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #0096ff;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0096ff 0%, #00bfff 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 150, 255, 0.4);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container mx-auto px-4 relative z-10">
        <div class="max-w-md mx-auto">
            <!-- Logo and Title -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-32 h-32 bg-white rounded-full shadow-lg mb-4 border-2 border-blue-400 overflow-hidden">
                    <img src="/static/logonew.png" alt="I-SAVE Logo" class="w-full h-full object-cover">
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">I-SAVE</h1>
            
            </div>

            <!-- Login Card -->
            <div class="glass-effect rounded-2xl shadow-2xl p-6">
                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="mb-4 p-4 rounded-lg {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200{% elif category == 'success' %}bg-green-50 text-green-700 border border-green-200{% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
                                <div class="flex items-center">
                                    <i class="fas {% if category == 'error' %}fa-exclamation-circle{% elif category == 'success' %}fa-check-circle{% else %}fa-info-circle{% endif %} mr-2"></i>
                                    {{ message }}
                                </div>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-semibold mb-2">ชื่อผู้ใช้</label>
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" name="username" required
                                   class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all text-gray-800 placeholder-gray-400"
                                   placeholder="กรอกชื่อผู้ใช้">
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-semibold mb-2">รหัสผ่าน</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" name="password" required
                                   class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all text-gray-800 placeholder-gray-400"
                                   placeholder="กรอกรหัสผ่าน">
                        </div>
                    </div>

                    <div class="mb-6 flex items-center justify-end">
                        <a href="/forgot-password" class="text-sm text-blue-600 hover:text-blue-800 transition-colors">ลืมรหัสผ่าน?</a>
                    </div>

                    <button type="submit" class="btn-primary w-full text-white font-semibold py-3 rounded-lg">
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        เข้าสู่ระบบ
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        ยังไม่มีบัญชี?
                        <a href="{{ url_for('register') }}" class="text-blue-600 hover:text-blue-800 font-semibold transition-colors">สมัครสมาชิก</a>
                    </p>
                </div>
            </div><!-- end glass-effect card -->

            <!-- Footer -->
            <div class="text-center mt-8 text-gray-500 text-sm">
                <p>&copy; 2025 I-SAVE. All rights reserved.</p>
            </div>
        </div>
    </div>
</body>
</html>
