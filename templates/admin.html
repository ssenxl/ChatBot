<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - I-SAVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f8fafc; }
        .gradient-bg {
            background: linear-gradient(135deg, #0096ff 0%, #00bfff 100%);
            box-shadow: 0 4px 20px rgba(0, 150, 255, 0.2);
        }
        .card-shadow {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            background: #ffffff;
            border: 1px solid #e2e8f0;
        }
        .chat-bubble-user {
            background: #0096ff;
            color: white;
            border-radius: 18px 18px 4px 18px;
        }
        .chat-bubble-bot {
            background: #f1f5f9;
            color: #1e293b;
            border-radius: 18px 18px 18px 4px;
        }
        .conv-item:hover { background: #f0f7ff; }
        .conv-item.active { background: #e0f0ff; border-left: 3px solid #0096ff; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-white rounded-full overflow-hidden shadow-sm">
                        <img src="/static/logonew.png" alt="I-SAVE Logo" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">I-SAVE Admin Panel</h1>
                        <p class="text-blue-100 text-xs">จัดการผู้ใช้งาน</p>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <a href="/chat" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm transition-all">
                        <i class="fas fa-comments mr-2"></i>กลับหน้าแชท
                    </a>
                    <a href="/logout" class="bg-red-500/80 hover:bg-red-600 px-4 py-2 rounded-lg text-sm transition-all">
                        <i class="fas fa-sign-out-alt mr-2"></i>ออกจากระบบ
                    </a>
                </div>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="card-shadow rounded-xl p-5 flex items-center space-x-4">
                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-users text-blue-600 text-xl"></i>
                </div>
                <div>
                    <p class="text-gray-500 text-sm">ผู้ใช้ทั้งหมด</p>
                    <p id="stat-total" class="text-2xl font-bold text-gray-800">-</p>
                </div>
            </div>
            <div class="card-shadow rounded-xl p-5 flex items-center space-x-4">
                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-user-check text-green-600 text-xl"></i>
                </div>
                <div>
                    <p class="text-gray-500 text-sm">ใช้งานอยู่</p>
                    <p id="stat-active" class="text-2xl font-bold text-gray-800">-</p>
                </div>
            </div>
            <div class="card-shadow rounded-xl p-5 flex items-center space-x-4">
                <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-user-shield text-purple-600 text-xl"></i>
                </div>
                <div>
                    <p class="text-gray-500 text-sm">Admin</p>
                    <p id="stat-admin" class="text-2xl font-bold text-gray-800">-</p>
                </div>
            </div>
        </div>

        <!-- User Table -->
        <div class="card-shadow rounded-xl overflow-hidden mb-8">
            <div class="flex items-center justify-between p-5 border-b border-gray-100">
                <h2 class="text-lg font-bold text-gray-800">
                    <i class="fas fa-users mr-2 text-blue-500"></i>รายชื่อผู้ใช้งาน
                </h2>
                <button onclick="loadUsers()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm transition-all">
                    <i class="fas fa-sync mr-2"></i>รีเฟรช
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase">ID</th>
                            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Username</th>
                            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Email</th>
                            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase">Role</th>
                            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase">สถานะ</th>
                            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase">สมัครเมื่อ</th>
                            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr>
                            <td colspan="7" class="text-center py-12 text-gray-400">
                                <i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i>กำลังโหลด...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Chat History Section -->
        <div id="chat-section" class="hidden">
            <div class="card-shadow rounded-xl overflow-hidden">
                <div class="flex items-center justify-between p-5 border-b border-gray-100">
                    <h2 class="text-lg font-bold text-gray-800">
                        <i class="fas fa-comments mr-2 text-blue-500"></i>
                        ประวัติแชท: <span id="chat-username" class="text-blue-600"></span>
                    </h2>
                    <button onclick="closeChatSection()" class="text-gray-400 hover:text-gray-600 transition-all">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>

                <div class="flex" style="height: 560px;">
                    <!-- Conversation List -->
                    <div class="w-72 border-r border-gray-100 flex flex-col">
                        <div class="p-3 border-b border-gray-100 bg-gray-50">
                            <p class="text-xs font-semibold text-gray-500 uppercase">การสนทนา</p>
                        </div>
                        <div id="conv-list" class="flex-1 overflow-y-auto">
                            <div class="text-center py-8 text-gray-400 text-sm">
                                <i class="fas fa-spinner fa-spin block mb-2"></i>กำลังโหลด...
                            </div>
                        </div>
                    </div>

                    <!-- Messages Panel -->
                    <div class="flex-1 flex flex-col">
                        <div id="msg-placeholder" class="flex-1 flex items-center justify-center text-gray-400">
                            <div class="text-center">
                                <i class="fas fa-hand-pointer text-4xl mb-3 block"></i>
                                <p class="text-sm">เลือกการสนทนาเพื่อดูข้อความ</p>
                            </div>
                        </div>
                        <div id="msg-panel" class="flex-1 overflow-y-auto p-4 space-y-3 hidden"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="reset-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md mx-4">
            <h3 class="text-lg font-bold text-gray-800 mb-1">
                <i class="fas fa-key mr-2 text-orange-500"></i>รีเซ็ตรหัสผ่าน
            </h3>
            <p id="reset-username-label" class="text-sm text-gray-500 mb-4"></p>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่านใหม่</label>
                <input type="password" id="new-password"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="อย่างน้อย 6 ตัวอักษร">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">ยืนยันรหัสผ่าน</label>
                <input type="password" id="confirm-password"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="กรอกรหัสผ่านอีกครั้ง">
            </div>
            <p id="modal-error" class="text-red-500 text-sm mb-3 hidden"></p>
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-all">
                    ยกเลิก
                </button>
                <button onclick="submitResetPassword()" class="flex-1 px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded-lg transition-all">
                    <i class="fas fa-key mr-2"></i>รีเซ็ต
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-5 right-5 hidden z-50">
        <div class="bg-white rounded-lg shadow-lg px-5 py-3 flex items-center space-x-3 border border-gray-100">
            <span id="toast-icon"></span>
            <span id="toast-message" class="text-sm font-medium"></span>
        </div>
    </div>

    <script>
        let targetUserId = null;
        let activeConvId = null;

        document.addEventListener('DOMContentLoaded', loadUsers);

        async function loadUsers() {
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = `<tr><td colspan="7" class="text-center py-12 text-gray-400">
                <i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i>กำลังโหลด...</td></tr>`;

            const res = await fetch('/admin/users');
            const data = await res.json();

            if (!data.success) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-8 text-red-400">โหลดข้อมูลไม่สำเร็จ</td></tr>`;
                return;
            }

            const users = data.users;
            document.getElementById('stat-total').textContent = users.length;
            document.getElementById('stat-active').textContent = users.filter(u => u.is_active).length;
            document.getElementById('stat-admin').textContent = users.filter(u => u.role === 'admin').length;

            if (users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-8 text-gray-400">ไม่มีผู้ใช้</td></tr>`;
                return;
            }

            tbody.innerHTML = users.map(u => `
                <tr class="border-t border-gray-100 hover:bg-gray-50 transition-colors">
                    <td class="px-5 py-4 text-sm text-gray-500">${u.id}</td>
                    <td class="px-5 py-4 font-medium text-gray-800">${escHtml(u.username)}</td>
                    <td class="px-5 py-4 text-sm text-gray-600">${escHtml(u.email)}</td>
                    <td class="px-5 py-4">
                        <span class="px-2 py-1 rounded-full text-xs font-semibold ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">
                            ${u.role}
                        </span>
                    </td>
                    <td class="px-5 py-4">
                        <span class="px-2 py-1 rounded-full text-xs font-semibold ${u.is_active ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${u.is_active ? 'ใช้งาน' : 'ปิดใช้งาน'}
                        </span>
                    </td>
                    <td class="px-5 py-4 text-sm text-gray-500">${formatDate(u.created_at)}</td>
                    <td class="px-5 py-4 flex items-center gap-2">
                        <button onclick="openChatHistory(${u.id}, '${escHtml(u.username)}')"
                            class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-medium transition-all">
                            <i class="fas fa-comments mr-1"></i>ดูแชท
                        </button>
                        <button onclick="openResetModal(${u.id}, '${escHtml(u.username)}')"
                            class="bg-orange-100 hover:bg-orange-200 text-orange-700 px-3 py-1.5 rounded-lg text-xs font-medium transition-all">
                            <i class="fas fa-key mr-1"></i>รีเซ็ตรหัสผ่าน
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // ---- Chat History ----

        async function openChatHistory(userId, username) {
            document.getElementById('chat-username').textContent = username;
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('chat-section').scrollIntoView({ behavior: 'smooth' });

            activeConvId = null;
            document.getElementById('msg-panel').classList.add('hidden');
            document.getElementById('msg-placeholder').classList.remove('hidden');

            const convList = document.getElementById('conv-list');
            convList.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">
                <i class="fas fa-spinner fa-spin block mb-2"></i>กำลังโหลด...</div>`;

            const res = await fetch(`/admin/users/${userId}/conversations`);
            const data = await res.json();

            if (!data.success || data.conversations.length === 0) {
                convList.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">
                    <i class="fas fa-comment-slash block text-2xl mb-2"></i>ยังไม่มีการสนทนา</div>`;
                return;
            }

            convList.innerHTML = data.conversations.map(c => `
                <div class="conv-item cursor-pointer p-3 border-b border-gray-50 transition-all"
                     id="conv-${c.id}" onclick="loadMessages(${c.id})">
                    <p class="text-sm font-medium text-gray-800 truncate">${escHtml(c.title || 'แชทใหม่')}</p>
                    <p class="text-xs text-gray-400 mt-0.5">${formatDateTime(c.updated_at)}</p>
                </div>
            `).join('');
        }

        function closeChatSection() {
            document.getElementById('chat-section').classList.add('hidden');
            activeConvId = null;
        }

        async function loadMessages(convId) {
            if (activeConvId) {
                document.getElementById(`conv-${activeConvId}`)?.classList.remove('active');
            }
            activeConvId = convId;
            document.getElementById(`conv-${convId}`)?.classList.add('active');

            const msgPanel = document.getElementById('msg-panel');
            const placeholder = document.getElementById('msg-placeholder');
            placeholder.classList.add('hidden');
            msgPanel.classList.remove('hidden');
            msgPanel.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">
                <i class="fas fa-spinner fa-spin block mb-2"></i>กำลังโหลด...</div>`;

            const res = await fetch(`/admin/conversations/${convId}/messages`);
            const data = await res.json();

            if (!data.success || data.messages.length === 0) {
                msgPanel.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">ไม่มีข้อความ</div>`;
                return;
            }

            msgPanel.innerHTML = data.messages.map(m => {
                const isUser = m.sender === 'user';
                return `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[75%]">
                        <div class="${isUser ? 'chat-bubble-user' : 'chat-bubble-bot'} px-4 py-2.5 text-sm leading-relaxed">
                            ${escHtml(m.message)}
                        </div>
                        <p class="text-xs text-gray-400 mt-1 ${isUser ? 'text-right' : 'text-left'}">
                            ${isUser ? 'ผู้ใช้' : 'AI'} · ${formatDateTime(m.created_at)}
                        </p>
                    </div>
                </div>`;
            }).join('');

            msgPanel.scrollTop = msgPanel.scrollHeight;
        }

        // ---- Reset Password ----

        function openResetModal(userId, username) {
            targetUserId = userId;
            document.getElementById('reset-username-label').textContent = `ผู้ใช้: ${username}`;
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
            document.getElementById('modal-error').classList.add('hidden');
            document.getElementById('reset-modal').classList.remove('hidden');
            document.getElementById('new-password').focus();
        }

        function closeModal() {
            document.getElementById('reset-modal').classList.add('hidden');
            targetUserId = null;
        }

        async function submitResetPassword() {
            const newPwd = document.getElementById('new-password').value;
            const confirmPwd = document.getElementById('confirm-password').value;

            if (!newPwd || newPwd.length < 6) { showModalError('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'); return; }
            if (newPwd !== confirmPwd) { showModalError('รหัสผ่านไม่ตรงกัน'); return; }

            const res = await fetch(`/admin/users/${targetUserId}/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ new_password: newPwd })
            });
            const data = await res.json();
            if (data.success) { closeModal(); showToast('รีเซ็ตรหัสผ่านสำเร็จ', 'success'); }
            else { showModalError(data.message || 'เกิดข้อผิดพลาด'); }
        }

        function showModalError(msg) {
            const el = document.getElementById('modal-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        // ---- Helpers ----

        function showToast(message, type = 'info') {
            const icons = {
                success: '<i class="fas fa-check-circle text-green-500"></i>',
                error: '<i class="fas fa-times-circle text-red-500"></i>',
                info: '<i class="fas fa-info-circle text-blue-500"></i>'
            };
            document.getElementById('toast-icon').innerHTML = icons[type] || icons.info;
            document.getElementById('toast-message').textContent = message;
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleString('th-TH', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function escHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        document.getElementById('reset-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
